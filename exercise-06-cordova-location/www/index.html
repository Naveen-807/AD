<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Current Location</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
    }
    .card {
      width: min(92vw, 420px);
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #1d4ed8;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    #result { margin-top: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Get Current Location</h2>
    <button id="btnLocation">Show Location</button>
    <div id="result">Tap the button to fetch GPS location.</div>
  </div>

  <script src="cordova.js"></script>
  <script>
    function setup() {
      const result = document.getElementById('result');

      document.getElementById('btnLocation').addEventListener('click', () => {
        if (!navigator.geolocation) {
          result.textContent = 'Geolocation is not supported on this device.';
          return;
        }

        result.textContent = 'Fetching location...';

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude.toFixed(6);
            const lon = position.coords.longitude.toFixed(6);
            result.innerHTML = `Latitude: ${lat}<br>Longitude: ${lon}`;
          },
          (error) => {
            result.textContent = `Error: ${error.message}`;
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
          }
        );
      });
    }

    document.addEventListener('deviceready', setup, false);
    document.addEventListener('DOMContentLoaded', () => {
      if (!window.cordova) setup();
    });
  </script>
</body>
</html>
